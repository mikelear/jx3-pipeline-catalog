apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: pullrequest
spec:
  pipelineSpec:
    tasks:
    - name: from-build-pack
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            limits: {}
          workingDir: /workspace/source
        steps:
        - image: ghcr.io/jenkins-x/jx-boot:3.16.59
          name: jx-variables
          resources:
            # set requests for the pod here
            requests:
              cpu: 400m
              memory: 512Mi
          script: |
            #!/usr/bin/env sh
            jx gitops variables --commit=false
            jx gitops pr variables
        - image: python:3.6.12-alpine
          name: build-python-unittest
          resources: {}
          script: |
            #!/bin/sh
            python -m unittest
        - image: ghcr.io/jenkins-x/jx-registry:0.1.17
          name: check-registry
          resources: {}
        - image: gcr.io/kaniko-project/executor:v1.9.1-debug
          name: build-container-build
          resources: {}
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
          script: |
            #!/busybox/sh
            set -e
            source .jx/variables.sh
            # Build Docker config with cluster registry + ghcr.io auth so kaniko
            # can pull FROM-images on ghcr.io/mikelear/* (e.g. leartech-agent-go).
            # Mirrors the auth pattern leartech-dockerfiles/*/release.yaml uses.
            sed 's/"credHelpers":{[^}]*},//' /tekton/creds/.docker/config.json > /workspace/docker-config.json
            if [ -n "$GIT_TOKEN" ]; then
              GHCR_AUTH=$(printf "mikelear:%s" "$GIT_TOKEN" | base64)
              cat /workspace/docker-config.json | sed "s/\"auths\":{/\"auths\":{\"ghcr.io\":{\"auth\":\"${GHCR_AUTH}\"},/" > /kaniko/.docker/config.json
            else
              cp /workspace/docker-config.json /kaniko/.docker/config.json
            fi
            /kaniko/executor $KANIKO_FLAGS --context=/workspace/source --dockerfile=${DOCKERFILE_PATH:-Dockerfile} --destination=$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/$APP_NAME:$VERSION
        - image: ghcr.io/jenkins-x-plugins/jx-preview:0.7.3
          name: promote-jx-preview
          resources: {}
          script: |
            #!/usr/bin/env sh
            source .jx/variables.sh
            jx preview create
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 12h0m0s
status: {}
